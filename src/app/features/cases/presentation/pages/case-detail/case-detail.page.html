<main class="case-page mx-auto max-w-6xl space-y-5 p-4 sm:p-6">
  @if (caseLoading()) {
    <section class="rounded-2xl border border-slate-200 bg-white p-5 text-slate-600">Cargando expediente...</section>
  } @else if (caseError()) {
    <section class="rounded-2xl border border-rose-200 bg-rose-50 p-5 text-rose-700">
      <p>{{ caseError() }}</p>
      <a class="mt-2 inline-block text-sm underline" [routerLink]="['/']">Volver al inicio</a>
    </section>
  } @else if (caseDetail(); as detail) {
    <app-case-header
      [caseDetail]="detail"
      [totalFiles]="files().length"
      [totalBatches]="totalBatches()"
      [lastUpdate]="lastUpdate()"
    />

    <section class="grid gap-5 xl:grid-cols-[420px_1fr]">
      <div class="space-y-3">
        <app-upload-batch-form
          [uploading]="uploading()"
          [resetKey]="uploadFormResetKey()"
          (submitBatch)="onSubmitBatch($event)"
        />

        @if (uploadSuccessMessage()) {
          <p class="rounded-xl border border-emerald-200 bg-emerald-50 px-3 py-2 text-sm text-emerald-700" aria-live="polite">
            {{ uploadSuccessMessage() }}
          </p>
        }
        @if (uploadErrorMessage()) {
          <p class="rounded-xl border border-rose-200 bg-rose-50 px-3 py-2 text-sm text-rose-700" aria-live="polite">
            {{ uploadErrorMessage() }}
          </p>
        }
      </div>

      <app-files-list
        [files]="files()"
        [loading]="filesLoading()"
        [error]="filesError()"
        [page]="filesMeta().page"
        [limit]="filesMeta().limit"
        [total]="filesMeta().total"
        [hasNext]="filesMeta().hasNext"
        (pageChange)="onFilesPageChange($event)"
      />
    </section>
  }
</main>
